<div
  aria-live="polite"
  aria-atomic="false"
  class="pointer-events-none fixed inset-x-0 bottom-0 z-[100] flex flex-col gap-2 px-3 pb-[calc(env(safe-area-inset-bottom)+12px)] sm:inset-x-auto sm:right-4 sm:top-4 sm:bottom-auto sm:max-w-sm sm:w-full sm:px-0 sm:pb-0"
>
  @for (toast of toasts(); track toast.id) {
    <div
      @toast
      role="status"
      [attr.aria-live]="ariaLive(toast.kind)"
      class="pointer-events-auto flex items-start gap-3 rounded-xl border p-3 shadow-lg backdrop-blur-sm sm:p-4"
      [class]="toast.styles.container"
    >
      <span
        class="mt-0.5 flex h-6 w-6 flex-none items-center justify-center"
        [class]="toast.styles.icon"
        aria-hidden="true"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path [attr.d]="toast.styles.iconPath" />
        </svg>
      </span>

      <p class="flex-1 text-sm leading-snug break-words">{{ toast.message }}</p>

      <button
        type="button"
        (click)="dismiss(toast.id)"
        class="flex-none flex items-center justify-center min-h-11 min-w-11 -m-2 rounded-md text-current/70 hover:text-current focus:outline-none focus-visible:ring-2 focus-visible:ring-current/40"
        [attr.aria-label]="'Fechar notificação: ' + toast.message"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M6 6l12 12M6 18L18 6" />
        </svg>
      </button>
    </div>
  }
</div>
