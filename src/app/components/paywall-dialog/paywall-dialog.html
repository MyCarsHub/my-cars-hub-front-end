@if (open()) {
  <div
    class="fixed inset-0 z-[70] flex items-end md:items-center justify-center"
    role="dialog"
    aria-modal="true"
    aria-labelledby="paywall-title"
    aria-describedby="paywall-body"
  >
    <!-- Backdrop -->
    <div
      @backdrop
      class="absolute inset-0 bg-neutral-900/70 backdrop-blur-sm"
      (click)="onBackdropClick()"
      aria-hidden="true"
    ></div>

    <!-- Sheet / Modal -->
    <div
      @sheet
      class="relative w-full md:max-w-md md:w-[92%] bg-white
             rounded-t-2xl md:rounded-2xl
             shadow-2xl overflow-hidden
             max-h-[85vh] md:max-h-[90vh]
             flex flex-col"
    >
      <!-- Mobile grabber -->
      <div class="md:hidden pt-2 pb-1 flex justify-center" aria-hidden="true">
        <span class="block w-10 h-1.5 rounded-full bg-neutral-200"></span>
      </div>

      <div class="px-5 pt-4 pb-6 sm:px-6 sm:pt-6 sm:pb-7 flex flex-col gap-5">
        <!-- Icon -->
        <div
          class="mx-auto w-14 h-14 rounded-2xl bg-primary-50 flex items-center justify-center"
          aria-hidden="true"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-primary-600"
          >
            <rect x="3" y="11" width="18" height="10" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>

        <div class="text-center space-y-2">
          <h2
            id="paywall-title"
            class="text-xl sm:text-2xl font-bold text-neutral-900 leading-tight"
          >
            {{ copy().title }}
          </h2>
          <p id="paywall-body" class="text-sm sm:text-base text-neutral-600 leading-relaxed">
            {{ copy().body }}
          </p>
        </div>

        <button
          type="button"
          (click)="onConfirm()"
          class="w-full min-h-[48px] px-5 py-3
                 bg-primary-500 hover:bg-primary-600 active:bg-primary-700
                 text-white font-bold rounded-xl
                 transition-colors
                 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2"
        >
          {{ copy().cta }}
        </button>

        @if (!hardBlock()) {
          <button
            type="button"
            (click)="onDismiss()"
            class="w-full min-h-[44px] text-sm text-neutral-500 hover:text-neutral-700 font-medium"
          >
            Agora não
          </button>
        }
      </div>
    </div>
  </div>
}
