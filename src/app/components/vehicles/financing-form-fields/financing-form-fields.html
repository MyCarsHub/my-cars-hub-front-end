<div [formGroup]="formGroup()" class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
  @if (showContractDate()) {
    <div>
      <label class="block text-sm font-medium text-neutral-700 mb-1.5">Data do contrato <span class="text-primary-500" aria-hidden="true">*</span></label>
      <input
        type="date"
        formControlName="contractDate"
        aria-required="true"
        class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-neutral-800
               focus:ring-2 focus:ring-primary-base/20 focus:border-primary-base transition-colors" />
      @if (fieldInvalid('contractDate')) {
        <p class="text-xs text-rose-600 mt-1">Informe a data do contrato.</p>
      }
    </div>
  }

  <div>
    <label class="block text-sm font-medium text-neutral-700 mb-1.5">Valor de compra (R$) <span class="text-primary-500" aria-hidden="true">*</span></label>
    <input
      type="number"
      step="0.01"
      min="0"
      formControlName="purchasePrice"
      aria-required="true"
      class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-neutral-800 tabular-nums
             focus:ring-2 focus:ring-primary-base/20 focus:border-primary-base transition-colors" />
    @if (fieldInvalid('purchasePrice')) {
      <p class="text-xs text-rose-600 mt-1">Informe o valor de compra.</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-neutral-700 mb-1.5">Entrada (R$)</label>
    <input
      type="number"
      step="0.01"
      min="0"
      formControlName="downPayment"
      class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-neutral-800 tabular-nums
             focus:ring-2 focus:ring-primary-base/20 focus:border-primary-base transition-colors" />
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-neutral-700 mb-1.5">Parcelas</label>
      <input
        type="number"
        min="0"
        formControlName="installments"
        class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-3 py-3 text-neutral-800 tabular-nums
               focus:ring-2 focus:ring-primary-base/20 focus:border-primary-base transition-colors" />
    </div>
    <div>
      <label class="block text-sm font-medium text-neutral-700 mb-1.5">Valor da parcela (R$)</label>
      <input
        type="number"
        step="0.01"
        min="0"
        formControlName="installmentAmount"
        class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-3 py-3 text-neutral-800 tabular-nums
               focus:ring-2 focus:ring-primary-base/20 focus:border-primary-base transition-colors" />
    </div>
  </div>
</div>
