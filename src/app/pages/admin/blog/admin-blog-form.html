<app-default-page-layout
  [title]="editing() ? 'Editar post' : 'Novo post'"
  description="Escreva em markdown. O HTML é gerado e sanitizado no backend."
>
  <div class="space-y-4 sm:space-y-6">
    <div class="flex items-center justify-between gap-2">
      <a routerLink="/admin/blog" class="text-sm text-neutral-500 hover:text-primary-500 font-medium">
        ← Voltar
      </a>
      @if (editing()) {
        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide"
          [class.bg-emerald-100]="status() === 'PUBLISHED'"
          [class.text-emerald-800]="status() === 'PUBLISHED'"
          [class.bg-neutral-200]="status() !== 'PUBLISHED'"
          [class.text-neutral-700]="status() !== 'PUBLISHED'">
          {{ status() === 'PUBLISHED' ? 'Publicado' : 'Rascunho' }}
        </span>
      }
    </div>

    <app-page-card title="Meta">
      <div class="p-4 sm:p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="flex flex-col gap-1 sm:col-span-2">
          <span class="text-xs font-semibold text-neutral-700">Título *</span>
          <input type="text" [ngModel]="title()" (ngModelChange)="onTitleInput($event)"
            placeholder="Como cobrar sem virar chato"
            class="px-3 py-2 rounded-lg border border-neutral-200 text-sm min-h-[44px]" />
        </label>

        <label class="flex flex-col gap-1">
          <span class="text-xs font-semibold text-neutral-700">Slug (URL) *</span>
          <input type="text" [ngModel]="slug()" (ngModelChange)="slug.set($event)"
            placeholder="como-cobrar-sem-virar-chato" pattern="^[a-z0-9]+(?:-[a-z0-9]+)*$"
            class="px-3 py-2 rounded-lg border border-neutral-200 text-sm min-h-[44px] font-mono" />
          <small class="text-[11px] text-neutral-500">Kebab-case: letras minúsculas, números, hífens.</small>
        </label>

        <label class="flex flex-col gap-1">
          <span class="text-xs font-semibold text-neutral-700">Categoria *</span>
          <select [ngModel]="category()" (ngModelChange)="category.set($event)"
            class="px-3 py-2 rounded-lg border border-neutral-200 text-sm min-h-[44px]">
            @for (c of categories; track c.value) {
              <option [value]="c.value">{{ c.label }}</option>
            }
          </select>
        </label>

        <label class="flex flex-col gap-1 sm:col-span-2">
          <span class="text-xs font-semibold text-neutral-700">Excerpt (chamada do card)</span>
          <textarea rows="2" maxlength="400" [ngModel]="excerpt()" (ngModelChange)="excerpt.set($event)"
            placeholder="Resumo curto que aparece no card da listagem."
            class="px-3 py-2 rounded-lg border border-neutral-200 text-sm resize-y"></textarea>
          <small class="text-[11px] text-neutral-500">{{ excerpt().length }}/400</small>
        </label>

        <label class="flex flex-col gap-1 sm:col-span-2">
          <span class="text-xs font-semibold text-neutral-700">URL da capa</span>
          <input type="url" [ngModel]="coverUrl()" (ngModelChange)="coverUrl.set($event)"
            placeholder="https://…/imagem.jpg"
            class="px-3 py-2 rounded-lg border border-neutral-200 text-sm min-h-[44px]" />
          <small class="text-[11px] text-neutral-500">Opcional. Se vazio, o card usa fallback com o logo.</small>
        </label>

        <label class="flex flex-col gap-1 sm:col-span-2">
          <span class="text-xs font-semibold text-neutral-700">Meta description (SEO)</span>
          <textarea rows="2" maxlength="300" [ngModel]="metaDescription()" (ngModelChange)="metaDescription.set($event)"
            placeholder="Descrição usada em resultados de busca."
            class="px-3 py-2 rounded-lg border border-neutral-200 text-sm resize-y"></textarea>
          <small class="text-[11px] text-neutral-500">{{ metaDescription().length }}/300</small>
        </label>
      </div>
    </app-page-card>

    <app-page-card title="Conteúdo (markdown)">
      <div class="p-4 sm:p-6 space-y-3">
        <textarea rows="24" [ngModel]="bodyMarkdown()" (ngModelChange)="bodyMarkdown.set($event)"
          placeholder="# Título&#10;&#10;Escreva em markdown. Suporte a **negrito**, *itálico*, [links](https://exemplo.com), listas, blockquotes, `código` e blocos ```..."
          class="w-full px-3 py-3 rounded-lg border border-neutral-200 text-sm font-mono resize-y min-h-[400px]"></textarea>
        <small class="text-[11px] text-neutral-500">{{ bodyMarkdown().length }} caracteres — mínimo 50</small>
      </div>
    </app-page-card>

    @if (editing() && bodyHtmlPreview()) {
      <app-page-card title="Preview do último salvo">
        <div class="p-4 sm:p-6">
          <div class="prose max-w-none" [innerHTML]="bodyHtmlPreview()"></div>
          <p class="text-[11px] text-neutral-500 mt-4">
            Salve pra regenerar o preview com as últimas alterações do markdown.
          </p>
        </div>
      </app-page-card>
    }

    <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-2">
      <a routerLink="/admin/blog"
        class="text-center px-4 py-3 rounded-xl border border-neutral-200 hover:bg-neutral-50 text-neutral-700 text-sm font-medium">
        Cancelar
      </a>
      <button type="button" (click)="save(false)" [disabled]="!canSubmit()"
        class="px-4 py-3 rounded-xl border border-neutral-200 hover:bg-neutral-50 text-neutral-700 text-sm font-semibold disabled:opacity-50">
        @if (saving()) { Salvando… } @else { Salvar rascunho }
      </button>
      <button type="button" (click)="save(true)" [disabled]="!canSubmit()"
        class="px-4 py-3 rounded-xl bg-primary-500 hover:bg-primary-600 text-white text-sm font-semibold shadow-sm disabled:opacity-50">
        @if (publishing()) { Publicando… } @else { {{ status() === 'PUBLISHED' ? 'Salvar' : 'Salvar e publicar' }} }
      </button>
    </div>
  </div>
</app-default-page-layout>
