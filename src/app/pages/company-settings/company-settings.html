<app-default-page-layout title="Configurações da Empresa"
    description="Gerencie as informações institucionais, plano e segurança da sua organização.">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6 lg:gap-8">

        <div class="lg:col-span-2 space-y-4 sm:space-y-6 lg:space-y-8">

            <!-- Informações Institucionais -->
            <app-page-card title="Informações Institucionais">

                <div cardIcon class="p-2 bg-primary-low rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-primary-500">
                        <rect width="16" height="16" x="4" y="4" rx="2" />
                        <path d="M9 22v-4h6v4" />
                        <path d="M8 4v.01" />
                        <path d="M16 4v.01" />
                        <path d="M12 4v.01" />
                        <path d="M12 8v.01" />
                        <path d="M12 12v.01" />
                        <path d="M12 16v.01" />
                        <path d="M8 8v.01" />
                        <path d="M8 12v.01" />
                        <path d="M8 16v.01" />
                        <path d="M16 8v.01" />
                        <path d="M16 12v.01" />
                        <path d="M16 16v.01" />
                    </svg>
                </div>

                <div cardActions class="flex flex-wrap items-center gap-2">
                    @if (isEditing()) {
                    <button (click)="cancelEdit()"
                        class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-3 py-2 rounded-lg transition-colors">
                        Cancelar
                    </button>
                    <button (click)="toggleEdit()" [disabled]="isSaving()"
                        class="text-sm font-medium bg-primary-500 text-white px-4 py-2 rounded-lg hover:bg-primary-600 transition-all shadow-sm disabled:opacity-50">
                        {{ isSaving() ? 'Salvando...' : 'Salvar Alterações' }}
                    </button>
                    } @else {
                    <button (click)="toggleEdit()"
                        class="text-sm font-medium text-primary-500 hover:bg-primary-low px-4 py-2 rounded-lg transition-all border border-transparent hover:border-primary-low">
                        Editar Dados
                    </button>
                    }
                </div>

                <form [formGroup]="companyForm" class="p-4 sm:p-6 lg:p-8 grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                    <div class="md:col-span-2">
                        <app-primary-input label="Nome da Empresa" placeholder="Ex: MyCarsHub Ltda"
                            formControlName="name" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-1.5">Tipo de Documento</label>
                        <select formControlName="documentType"
                            class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-neutral-800 focus:ring-2 focus:ring-primary-base/20 focus:border-primary-base transition-colors disabled:opacity-60 disabled:cursor-not-allowed appearance-none"
                            [class.cursor-pointer]="isEditing()">
                            @if (companyInfo()?.documentType) {
                            <option [value]="companyInfo()?.documentType">{{ companyInfo()?.documentType }}</option>
                            }
                            @if (companyInfo()?.documentType !== 'CNPJ') { <option value="CNPJ">CNPJ</option> }
                            @if (companyInfo()?.documentType !== 'CPF') { <option value="CPF">CPF</option> }
                        </select>
                    </div>

                    <app-primary-input label="Número do Documento" placeholder="00.000.000/0000-00"
                        formControlName="documentNumber" />

                    <div class="pt-2">
                        <label class="block text-sm font-medium text-neutral-500 mb-1">Data de Fundação</label>
                        <p class="text-neutral-800 font-medium">{{ companyInfo()?.createdDate }}</p>
                    </div>

                    <div class="pt-2">
                        <label class="block text-sm font-medium text-neutral-500 mb-1">Status da Conta</label>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
                                     bg-emerald-100 text-emerald-800 border border-emerald-200">
                            {{ companyInfo()?.status }}
                        </span>
                    </div>
                </form>

            </app-page-card>

            <!-- Integrações -->
            <app-page-card title="Integrações">

                <div cardIcon class="p-2 bg-primary-low rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-primary-500">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                    </svg>
                </div>

                <div class="p-4 sm:p-6 space-y-3">
                    <a routerLink="/configuracoes/integracoes/asaas"
                       class="group flex items-center gap-3 sm:gap-4 rounded-xl border border-neutral-200 hover:border-primary-300
                              hover:bg-primary-50/30 p-3 sm:p-4 transition-colors">
                        <div class="w-11 h-11 rounded-xl bg-primary-500/10 flex items-center justify-center shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-primary-600" aria-hidden="true">
                                <rect x="2" y="5" width="20" height="14" rx="2"/>
                                <line x1="2" y1="10" x2="22" y2="10"/>
                            </svg>
                        </div>
                        <div class="min-w-0 flex-1">
                            <p class="text-sm font-semibold text-neutral-900">Asaas</p>
                            <p class="text-xs text-neutral-500 truncate">
                                Cobranças de aluguéis e caução direto na sua conta Asaas.
                            </p>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" class="text-neutral-400 group-hover:text-primary-600 shrink-0"
                            aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </a>
                </div>

            </app-page-card>

        </div>

        <div class="space-y-8">

            <!-- Proprietário da Organização -->
            <app-page-card title="Proprietário da Organização">
                <div class="p-6">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 rounded-full bg-primary-500 flex items-center justify-center
                                    text-white font-bold text-lg shadow-inner">
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <p class="font-semibold text-neutral-900">{{ owner().name }}</p>
                                <span class="px-2 py-0.5 bg-primary-low text-primary-500 text-[10px] font-bold
                                             uppercase rounded-md tracking-wider border border-primary-low">
                                    Owner
                                </span>
                            </div>
                            <p class="text-sm text-neutral-500">{{ owner().email }}</p>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-neutral-50 flex items-center justify-between text-sm">
                        <span class="text-neutral-500">No MyCarsHub desde</span>
                        <span class="font-medium text-neutral-700">{{ owner().joinedAt }}</span>
                    </div>
                </div>
            </app-page-card>

        </div>
    </div>

    <!-- Confirmação de salvar -->
    <app-confirm-dialog [open]="showConfirmDialog()" title="Salvar alterações"
        message="Tem certeza que deseja salvar as alterações nas informações da empresa?" confirmLabel="Sim, salvar"
        cancelLabel="Cancelar" variant="info" (confirmed)="onConfirmSave()" (cancelled)="onCancelConfirm()" />

</app-default-page-layout>
