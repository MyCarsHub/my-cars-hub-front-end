<section class="cta">
  <div class="cta__particles" aria-hidden="true">
    @for (i of particles; track i) {
      <span class="p" [style.--i]="i"></span>
    }
  </div>
  <div class="cta__inner">
    <h2>Sua locadora organizada começa <span class="accent">hoje</span>.</h2>
    <p>14 dias grátis. Sem cartão. Sem burocracia.</p>
    <a routerLink="/login" class="btn-primary">
      Começar agora
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>
    <small>Cancele quando quiser. Migração assistida grátis.</small>
  </div>
</section>
