<section id="planos" class="relative isolate overflow-hidden bg-paper px-5 md:px-8 py-14 sm:py-8 lg:py-9">
  <div aria-hidden="true" class="pointer-events-none absolute inset-0 -z-10" style="background: radial-gradient(ellipse 50% 40% at 50% 30%, rgba(235,63,0,0.08), transparent 60%);"></div>

  <div class="max-w-[1200px] mx-auto flex flex-col gap-5">
    <header class="flex flex-col gap-2.5 max-w-[720px] text-center items-center mx-auto">
      <h2 class="reveal font-display font-bold text-[clamp(1.5rem,3vw,2.15rem)] tracking-[-0.028em] m-0">
        Locadoras que crescem <span class="hl">sem virar caos</span>.
      </h2>
      <p class="reveal text-[15.5px] text-ink/70 m-0 max-w-[52ch]">
        14 dias de trial completo, sem cartão. Depois escolha o plano que cabe na sua operação.
      </p>

      <!-- Toggle mensal/anual -->
      <div class="reveal inline-flex items-center gap-1 bg-paper-alt border border-rule rounded-full p-1 mt-3 shadow-[0_8px_24px_-18px_rgba(10,10,10,0.14)]" role="tablist" aria-label="Ciclo de cobrança">
        <button
          type="button"
          role="tab"
          class="relative border-none bg-transparent px-5 py-2.5 rounded-full font-body font-semibold text-[13.5px] cursor-pointer inline-flex items-center gap-2 min-h-[40px] transition-colors duration-200"
          [class.text-white]="cycle() === 'monthly'"
          [class.text-ink/70]="cycle() !== 'monthly'"
          [class.hover:text-ink]="cycle() !== 'monthly'"
          [style.background]="cycle() === 'monthly' ? 'linear-gradient(135deg, #FF5722 0%, #EB3F00 55%, #C93300 100%)' : 'transparent'"
          [style.box-shadow]="cycle() === 'monthly' ? '0 6px 18px -6px rgba(235,63,0,0.4)' : 'none'"
          [attr.aria-selected]="cycle() === 'monthly'"
          (click)="setCycle('monthly')"
        >Mensal</button>
        <button
          type="button"
          role="tab"
          class="relative border-none bg-transparent px-5 py-2.5 rounded-full font-body font-semibold text-[13.5px] cursor-pointer inline-flex items-center gap-2 min-h-[40px] transition-colors duration-200"
          [class.text-white]="cycle() === 'yearly'"
          [class.text-ink/70]="cycle() !== 'yearly'"
          [class.hover:text-ink]="cycle() !== 'yearly'"
          [style.background]="cycle() === 'yearly' ? 'linear-gradient(135deg, #34D399 0%, #10B981 55%, #059669 100%)' : 'transparent'"
          [style.box-shadow]="cycle() === 'yearly' ? '0 6px 18px -6px rgba(16,185,129,0.45)' : 'none'"
          [attr.aria-selected]="cycle() === 'yearly'"
          (click)="setCycle('yearly')"
        >
          Anual
          <span
            class="text-[10.5px] font-bold px-2 py-0.5 rounded-full tracking-[0.04em] text-white"
            [class.bg-white/[0.22]]="cycle() === 'yearly'"
            [class.bg-emerald-600]="cycle() !== 'yearly'"
          >-{{ proSavings() }}%</span>
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-[0.9fr_1.15fr_0.9fr] gap-5 lg:gap-6 items-stretch lg:items-center">
      <div class="reveal">
        <app-plan-card
          variant="trial"
          name="Trial gratuito"
          price="R$ 0"
          cycleSuffix="14 dias"
          description="Pra você testar tudo sem compromisso."
          [features]="trialItems"
          ctaLabel="Criar conta grátis"
          (ctaClick)="goToLogin()"
        />
      </div>

      <div class="reveal">
        <app-plan-card
          variant="pro"
          name="Pro"
          [price]="proPriceLabel()"
          [cycleSuffix]="proCycleSuffix()"
          [subtitleText]="proSubtitle()"
          description="Pra operações que precisam de mais capacidade."
          [features]="proItems"
          [gradientCss]="proGradient()"
          [shadowCss]="proShadow()"
          [accentTextClass]="proAccentText()"
          ribbonText="Mais popular"
          ctaLabel="Assinar Pro"
          (ctaClick)="goToLogin()"
        />
      </div>

      <div class="reveal">
        <app-plan-card
          variant="business"
          name="Enterprise"
          [price]="enterprisePriceLabel()"
          [cycleSuffix]="proCycleSuffix()"
          [subtitleText]="enterpriseSubtitle()"
          description="Frota grande, integrações premium, suporte dedicado."
          [features]="enterpriseItems"
          beforeFeaturesText="Tudo que o plano Pro tem +"
          ribbonText="Sua frota cresceu?"
          ctaLabel="Assinar Enterprise"
          (ctaClick)="goToLogin()"
        />
      </div>
    </div>
  </div>
</section>
