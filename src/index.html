<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyCarsHub</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#EB3F00">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="svg/logo-my-cars-hub.svg">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Sora + DM Sans mantêm a identidade da marca (usadas no app shell + landing).
       JetBrains Mono acrescentada só pra números tabulares na landing. -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- SEO + Social Sharing -->
  <meta name="description" content="MyCarsHub — plataforma completa para gestão de locadoras: veículos, motoristas, aluguéis, cobranças e relatórios em um só lugar." />

  <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MyCarsHub" />
  <meta property="og:title" content="MyCarsHub — Gestão inteligente para locadoras" />
  <meta property="og:description" content="Controle veículos, motoristas, aluguéis, cobranças e relatórios em uma plataforma só. Integração com Asaas, Autentique e mais." />
  <meta property="og:url" content="https://mycarshub.app.br" />
  <meta property="og:image" content="https://mycarshub.app.br/icons/icon-512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="Logo MyCarsHub" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MyCarsHub — Gestão inteligente para locadoras" />
  <meta name="twitter:description" content="Controle veículos, motoristas, aluguéis, cobranças e relatórios em uma plataforma só." />
  <meta name="twitter:image" content="https://mycarshub.app.br/icons/icon-512.png" />
  <meta name="twitter:image:alt" content="Logo MyCarsHub" />
</head>
<body>
  <app-root></app-root>
</body>
</html>
